<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>werk — tension tree</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --border: #e8e4df;
    --text: #3d3832;
    --text-secondary: #8a8279;
    --text-muted: #b5ada4;
    --accent: #c47d4e;
    --accent-light: #f5ebe3;
    --green: #6b9e6b;
    --green-light: #e8f2e8;
    --amber: #c9a84c;
    --amber-light: #faf3e0;
    --red: #c46b6b;
    --red-light: #fae8e8;
    --blue: #6b8ec4;
    --blue-light: #e8eff8;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 40px 20px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 6px;
  }

  header p {
    font-size: 15px;
    color: var(--text-secondary);
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 20px;
    padding: 16px 24px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: inline-flex;
  }

  header .stats-bar-wrap {
    text-align: center;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tree {
    margin-top: 8px;
  }

  .tension-group {
    margin-bottom: 4px;
  }

  .tension-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
    position: relative;
  }

  .tension-card:hover {
    box-shadow: var(--shadow-hover);
    border-color: #d5cfc8;
  }

  .tension-card.expanded {
    border-color: var(--accent);
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
  }

  .tension-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .tension-chevron {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: transform 0.2s ease;
    margin-top: 2px;
  }

  .tension-card.expanded .tension-chevron {
    transform: rotate(90deg);
    color: var(--accent);
  }

  .tension-chevron svg {
    width: 14px;
    height: 14px;
  }

  .tension-main {
    flex: 1;
    min-width: 0;
  }

  .tension-title-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }

  .tension-code {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    flex-shrink: 0;
    background: var(--accent-light);
    padding: 1px 8px;
    border-radius: 6px;
  }

  .tension-desired {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }

  .tension-badges {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  .badge-closure {
    background: var(--green-light);
    color: var(--green);
  }

  .badge-closure.none {
    background: #f0eeec;
    color: var(--text-muted);
  }

  .badge-horizon {
    background: var(--blue-light);
    color: var(--blue);
  }

  .badge-sequencing {
    background: var(--amber-light);
    color: var(--amber);
  }

  .badge-overdue {
    background: var(--red-light);
    color: var(--red);
  }

  .badge-containment {
    background: var(--red-light);
    color: var(--red);
  }

  .closure-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .closure-bar {
    width: 60px;
    height: 5px;
    background: #eee;
    border-radius: 3px;
    overflow: hidden;
  }

  .closure-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .tension-detail {
    display: none;
    background: var(--card);
    border: 1px solid var(--accent);
    border-top: none;
    border-bottom-left-radius: var(--radius);
    border-bottom-right-radius: var(--radius);
    padding: 20px 20px 20px 52px;
  }

  .tension-detail.open {
    display: block;
  }

  .detail-section {
    margin-bottom: 16px;
  }

  .detail-section:last-child {
    margin-bottom: 0;
  }

  .detail-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .detail-text {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .children {
    margin-left: 28px;
    padding-left: 16px;
    border-left: 2px solid var(--border);
    margin-top: 4px;
  }

  .depth-0 > .tension-group > .tension-card { border-left: 3px solid var(--accent); }
  .depth-1 > .tension-group > .tension-card { border-left: 3px solid var(--blue); }
  .depth-2 > .tension-group > .tension-card { border-left: 3px solid var(--green); }
  .depth-3 > .tension-group > .tension-card { border-left: 3px solid var(--amber); }

  .leaf-indicator {
    color: var(--text-muted);
    font-size: 12px;
  }

  @media (max-width: 600px) {
    body { padding: 20px 12px; }
    .children { margin-left: 12px; padding-left: 12px; }
    .tension-card { padding: 12px 14px; }
    .tension-detail { padding: 14px 14px 14px 36px; }
    header h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>werk</h1>
    <p>tension tree</p>
    <div class="stats-bar-wrap">
      <div class="stats-bar" id="stats-bar"></div>
    </div>
  </header>
  <div class="tree" id="tree"></div>
</div>

function buildTree(tensions) {
  const byParent = {};
  const roots = [];
  for (const t of tensions) {
    const pid = t.parent_id || '__root__';
    if (!byParent[pid]) byParent[pid] = [];
    byParent[pid].push(t);
    if (!t.parent_id) roots.push(t);
  }
  return { roots, byParent };
}

function formatHorizon(h) {
  if (!h) return null;
  const d = new Date(h + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric', day: undefined });
}

function chevronSVG() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';
}

function renderTension(t, byParent, depth) {
  const children = byParent[t.id] || [];
  const hasChildren = children.length > 0;
  const closurePct = t.closure_total > 0 ? Math.round((t.closure_resolved / t.closure_total) * 100) : -1;

  let badges = '';

  if (t.closure_total > 0) {
    badges += '<div class="closure-bar-wrap">' +
      '<span class="badge badge-closure">' + t.closure_resolved + '/' + t.closure_total + '</span>' +
      '<div class="closure-bar"><div class="closure-bar-fill" style="width:' + closurePct + '%"></div></div>' +
      '</div>';
  } else if (hasChildren) {
    badges += '<span class="badge badge-closure none">leaf children</span>';
  }

  if (t.horizon) {
    badges += '<span class="badge badge-horizon">' + formatHorizon(t.horizon) + '</span>';
  }
  if (t.sequencing_pressure) {
    badges += '<span class="badge badge-sequencing">sequencing pressure</span>';
  }
  if (t.overdue) {
    badges += '<span class="badge badge-overdue">overdue</span>';
  }
  if (t.containment_violation) {
    badges += '<span class="badge badge-containment">containment issue</span>';
  }

  const id = 'tension-' + t.short_code;

  let html = '<div class="tension-group">';
  html += '<div class="tension-card" id="' + id + '" onclick="toggleTension(' + t.short_code + ')">';
  html += '<div class="tension-header">';
  html += '<div class="tension-chevron">' + (hasChildren || t.actual ? chevronSVG() : '<span class="leaf-indicator">&middot;</span>') + '</div>';
  html += '<div class="tension-main">';
  html += '<div class="tension-title-row">';
  html += '<span class="tension-code">#' + t.short_code + '</span>';
  html += '<span class="tension-desired">' + escapeHTML(t.desired) + '</span>';
  html += '</div>';
  if (badges) {
    html += '<div class="tension-badges">' + badges + '</div>';
  }
  html += '</div></div></div>';

  // Detail panel
  html += '<div class="tension-detail" id="detail-' + t.short_code + '">';
  if (t.actual) {
    html += '<div class="detail-section"><div class="detail-label">Current Reality</div>';
    html += '<div class="detail-text">' + escapeHTML(t.actual) + '</div></div>';
  }
  html += '</div>';

  // Children
  if (hasChildren) {
    html += '<div class="children depth-' + (depth + 1) + '" id="children-' + t.short_code + '">';
    for (const child of children) {
      html += renderTension(child, byParent, depth + 1);
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function toggleTension(code) {
  const card = document.getElementById('tension-' + code);
  const detail = document.getElementById('detail-' + code);
  if (!card || !detail) return;

  const isExpanded = card.classList.contains('expanded');
  card.classList.toggle('expanded');
  detail.classList.toggle('open');
}

function init() {
  const { roots, byParent } = buildTree(DATA.tensions);

  // Stats
  const total = DATA.tensions.length;
  const withHorizon = DATA.tensions.filter(t => t.horizon).length;
  const seqPressure = DATA.tensions.filter(t => t.sequencing_pressure).length;
  const totalResolved = DATA.tensions.reduce((s, t) => s + t.closure_resolved, 0);
  const totalClosure = DATA.tensions.reduce((s, t) => s + t.closure_total, 0);

  document.getElementById('stats-bar').innerHTML =
    '<div class="stat"><div class="stat-value">' + total + '</div><div class="stat-label">Tensions</div></div>' +
    '<div class="stat"><div class="stat-value">' + roots.length + '</div><div class="stat-label">Root</div></div>' +
    '<div class="stat"><div class="stat-value">' + withHorizon + '</div><div class="stat-label">With Horizon</div></div>' +
    (seqPressure > 0 ? '<div class="stat"><div class="stat-value">' + seqPressure + '</div><div class="stat-label">Seq. Pressure</div></div>' : '');

  // Render tree
  let html = '<div class="depth-0">';
  for (const root of roots) {
    html += renderTension(root, byParent, 0);
  }
  html += '</div>';
  document.getElementById('tree').innerHTML = html;
}

init();
</script>
</body>
</html>
