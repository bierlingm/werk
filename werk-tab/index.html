<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>werk</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="root">
      <header>
        <div class="stamp-group">
          <div class="stamp">werk</div>
          <button id="workspace-button" class="workspace-button" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="workspace-name" id="workspace-name">…</span>
            <span class="workspace-caret" aria-hidden="true">▾</span>
          </button>
          <ul id="workspace-menu" class="workspace-menu" role="listbox" hidden></ul>
        </div>
        <div class="summary" id="summary"></div>
      </header>

      <section class="band band-overdue" id="band-overdue" hidden>
        <h2>overdue</h2>
        <ul class="list" id="list-overdue"></ul>
      </section>

      <section class="band band-next" id="band-next" hidden>
        <h2>next</h2>
        <ul class="list" id="list-next"></ul>
      </section>

      <section class="band band-held" id="band-held" hidden>
        <h2>held</h2>
        <ul class="list" id="list-held"></ul>
      </section>

      <section class="band band-silent" id="band-silent" hidden>
        <p class="silent-msg">no signal. silence is the default.</p>
      </section>

      <section class="band band-offline" id="band-offline" hidden>
        <p class="offline-msg"><code>werk serve</code> is not running.</p>
        <p class="offline-hint">start it in your workspace and this page will fill in.</p>
      </section>

      <footer>
        <span id="status" class="status"></span>
        <a class="link" href="http://localhost:3749" target="_blank">open werk web →</a>
      </footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
