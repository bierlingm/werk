[package]
name = "werk"
version = "0.2.0"
edition = "2021"
description = "Operative instrument for structural dynamics — practice, presence, oracle"

[[bin]]
name = "werk"
path = "src/main.rs"

[dependencies]
sd-core = { path = "../sd-core" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
toml = "0.8"
owo-colors = "4"
thiserror = "2"
dirs = "6"
ulid = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
